<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
lucide.createIcons();

const counters=document.querySelectorAll('.counter');
const counterObserver=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting&&!entry.target.classList.contains('counted')){
      entry.target.classList.add('counted');
      const target=+entry.target.getAttribute('data-target');
      const prefix=entry.target.getAttribute('data-prefix')||'';
      const suffix=entry.target.getAttribute('data-suffix')||'';
      let current=0;
      const inc=Math.max(1,Math.floor(target/50));
      const timer=setInterval(()=>{
        current+=inc;
        if(current>=target){current=target;clearInterval(timer);}
        entry.target.textContent=prefix+current.toLocaleString()+suffix;
      },30);
    }
  });
},{threshold:0.3});
counters.forEach(counter=>counterObserver.observe(counter));

const formBackdrop=document.getElementById('formBackdrop');
const formContainer=document.getElementById('formContainer');
const mainForm=document.getElementById('mainForm');
const sourceInfo=document.getElementById('sourceInfo');
const closeFormBtn=document.getElementById('closeFormBtn');
const ppOverlay=document.getElementById('ppOverlay');
const ppClose=document.getElementById('ppClose');
const privacyBtn=document.getElementById('privacyBtn');
const submitBtn = document.getElementById('submitBtn');
const btnText = submitBtn.querySelector('.btn-text');
const btnLoader = submitBtn.querySelector('.btn-loader');

// ✅ NEW GOOGLE SCRIPT URL (UPDATED)
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzvxkng0Rlf8OWd5b0g_uzeuy9X2uK7hZL7rDL2cuzC-PjjfHaX84UteRMHWrqp_WTr/exec";
// ✅ WHATSAPP NUMBER
const WA_NUMBER_INT="919257947752";

function openForm(source='site'){
  sourceInfo.value=source;
  formBackdrop.classList.add('show');
  formContainer.classList.add('show');
  document.body.style.overflow='hidden';
}

function closeForm(){
  formBackdrop.classList.remove('show');
  formContainer.classList.remove('show');
  document.body.style.overflow='';
  setTimeout(()=>mainForm.reset(),300);
}

function openPrivacy(){
  ppOverlay.classList.add('show');
  document.body.style.overflow='hidden';
}

function closePrivacy(){
  ppOverlay.classList.remove('show');
  document.body.style.overflow='';
}

formBackdrop.addEventListener('click',closeForm);
closeFormBtn.addEventListener('click',closeForm);
privacyBtn.addEventListener('click',openPrivacy);
ppClose.addEventListener('click',closePrivacy);
ppOverlay.addEventListener('click',function(e){if(e.target===ppOverlay)closePrivacy();});

document.addEventListener('click',e=>{
  const trigger=e.target.closest('.open-any');
  if(trigger&&!trigger.closest('#formContainer')){
    e.preventDefault();
    openForm(trigger.getAttribute('data-source')||'Website');
  }
});

// ✅ FIXED: Form submission with FormData (Most Reliable Method)
mainForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  
  const name=document.getElementById('inp_name').value.trim();
  const phone=document.getElementById('inp_phone').value.replace(/\D/g,'');
  const age=document.getElementById('inp_age').value;
  const gender=document.getElementById('inp_gender').value;
  const profession=document.getElementById('inp_profession').value;

  // Validation
  if(!name || phone.length < 10 || !age || !gender || !profession){
    alert('Please fill all fields correctly. Phone must be at least 10 digits.');
    return;
  }

  // Show loading state
  btnText.classList.add('d-none');
  btnLoader.classList.remove('d-none');
  submitBtn.disabled = true;

  // ✅ METHOD 1: FormData (No Content-Type header needed - Browser sets it automatically)
  const formData = new FormData();
  formData.append('Timestamp', new Date().toLocaleString());
  formData.append('Name', name);
  formData.append('Phone', phone);
  formData.append('Age', age);
  formData.append('Gender', gender);
  formData.append('Profession', profession);
  formData.append('Source', sourceInfo.value || 'Website');

  console.log('Sending data to Google Sheets...', Object.fromEntries(formData));

  try {
    // Send to Google Sheets
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Required for Google Scripts
      body: formData
    });
    console.log('Data sent successfully!');
  } catch (err) {
    console.error('Sheet error:', err);
    // Continue to WhatsApp even if sheet fails
  }

  // ✅ Meta Pixel - Contact event (Single event only)
  if(typeof fbq!=='undefined'){
    fbq('track', 'Contact', {
      content_name: 'WhatsApp Lead Form',
      content_category: 'Lead Generation',
      content_source: sourceInfo.value || 'Website',
      value: 0.00,
      currency: 'INR'
    });
  }

  // ✅ Open WhatsApp with formatted message
  const message=encodeURIComponent(
    `Hello Ma'am,\n\nI am interested in your program. Here are my details:\n\nName: ${name}\nPhone: ${phone}\nAge: ${age}\nGender: ${gender}\nProfession: ${profession}\n\nPlease share next steps. Thank you!`
  );

  window.open(`https://wa.me/${WA_NUMBER_INT}?text=${message}`,'_blank');
  
  // Reset form and button
  closeForm();
  btnText.classList.remove('d-none');
  btnLoader.classList.add('d-none');
  submitBtn.disabled = false;
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeForm();
    closePrivacy();
  }
});
</script>
</body>
</html>
